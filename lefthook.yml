# Lefthook config for Harmon Dotfiles
# Install:  task install:hooks   (runs `lefthook install`)
# Run:      lefthook run pre-push
#
# This repo is chezmoi-managed with autoCommit + autoPush to main, so the usual
# pre-commit (no-commit-to-main) and commit-msg (commitlint — chezmoi's auto
# messages aren't Conventional Commits) hooks would block every auto-commit.
# Keep only the gitleaks pre-push scan so secrets are still caught before they
# reach GitHub. Intentional divergence from harmon-init's template lefthook.yml;
# expect a copier-update conflict here and keep this trimmed version.
#
# Logic lives in Taskfile.yml so CI, Claude hooks, and local runs use the same
# command.

assert_lefthook_installed: true

pre-push:
  parallel: true
  commands:
    secrets:
      run: task security:secrets
