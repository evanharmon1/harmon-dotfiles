name: Build & Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

# Parallel jobs that all call into the Taskfile so local + CI run identical commands.
# A final `verify` job aggregates statuses for branch protection
# (required checks: verify + security). Every job's toolchain setup goes through
# the shared ./.github/actions/setup composite action.

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          lint-tools: "true"
      - name: Install chezmoi test runtime
        run: |
          # renovate: datasource=github-releases depName=twpayne/chezmoi extractVersion=^v?(?<version>.+)$
          CHEZMOI_VERSION=2.71.0
          CHEZMOI_SHA256=6ea2040ecc0e82d3dac604289e100b0157afefcd94ebb818e5f6e31655156d34
          curl -fsSL --retry 3 -o /tmp/chezmoi.tgz \\
            "https://github.com/twpayne/chezmoi/releases/download/v${CHEZMOI_VERSION}/chezmoi_${CHEZMOI_VERSION}_linux_amd64.tar.gz"
          echo "${CHEZMOI_SHA256}  /tmp/chezmoi.tgz" | sha256sum -c -
          tar -xzf /tmp/chezmoi.tgz -C /tmp chezmoi
          sudo install -m 0755 /tmp/chezmoi /usr/local/bin/chezmoi
      - name: Lint
        run: task check
      - run: task test

  security:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          gitleaks: "true"
      - name: Secrets scan
        run: task security:secrets
      - name: Dependency audit
        run: task security:audit
      - name: SAST (Semgrep Community Edition)
        run: task security:sast

  verify:
    if: always()
    needs: [lint, security]
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    env:
      IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      # Never check out or run fork-controlled repository code on this path.
      - name: Verify deliberate skips at the untrusted-fork boundary
        if: env.IS_FORK == 'true'
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          fail=0
          check_skipped() {
            if [ "$2" != "skipped" ]; then
              echo "Job $1 result: $2 (expected skipped for an untrusted fork)"
              fail=1
            fi
          }
          check_skipped lint "$LINT_RESULT"
          check_skipped security "$SECURITY_RESULT"
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Untrusted fork trust boundary enforced: all repository-controlled jobs were deliberately skipped."
      - if: env.IS_FORK != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify required jobs succeeded
        if: env.IS_FORK != 'true'
        env:
          EXPECTED_RESULT: success
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: ./scripts/verify-required-results.sh "lint=${LINT_RESULT}" "security=${SECURITY_RESULT}"
