name: Build & Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

# Parallel jobs that all call into the Taskfile so local + CI run identical commands.
# A final `verify` job aggregates statuses for branch protection
# (required checks: verify + security). Every job's toolchain setup goes through
# the shared ./.github/actions/setup composite action.

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          lint-tools: "true"
      - name: Lint
        run: task check
      - run: task test:tasks
      - run: task test:release-title
      - name: Skills drift check (vendored skills vs pinned harmon-devkit ref)
        run: task verify:skills

  security:
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          gitleaks: "true"
      - name: Secrets scan
        run: task security:secrets
      - name: Dependency audit
        run: task security:audit
      - name: SAST (Semgrep Community Edition)
        run: task security:sast

  verify:
    if: always()
    needs: [lint, security]
    # Runner switch: CI_RUNS_ON repo/org variable unset -> the rendered
    # default; set it to a JSON runner spec to override without a commit.
    runs-on: ${{ fromJSON(vars.CI_RUNS_ON || '"ubuntu-latest"') }}
    env:
      IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      # Never check out or run fork-controlled repository code on this path.
      - name: Verify deliberate skips at the untrusted-fork boundary
        if: env.IS_FORK == 'true'
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          fail=0
          check_skipped() {
            if [ "$2" != "skipped" ]; then
              echo "Job $1 result: $2 (expected skipped for an untrusted fork)"
              fail=1
            fi
          }
          check_skipped lint "$LINT_RESULT"
          check_skipped security "$SECURITY_RESULT"
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Untrusted fork trust boundary enforced: all repository-controlled jobs were deliberately skipped."
      - if: env.IS_FORK != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify required jobs succeeded
        if: env.IS_FORK != 'true'
        env:
          EXPECTED_RESULT: success
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: ./scripts/verify-ci-results.sh "lint=${LINT_RESULT}" "security=${SECURITY_RESULT}"
# Keep a literal final line after the inline Jinja conditionals above; with
# trim_blocks enabled, ending on a block tag would strip the workflow's EOF newline.
